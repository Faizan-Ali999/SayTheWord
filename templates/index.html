<!DOCTYPE html>
<html>
<head>
    <title>Clickable Image Text</title>
    <style>
        .image-container {
            position: relative;
            display: inline-block;
        }

        .word-box {
            position: absolute;
            border: 1px solid rgba(0, 0, 255, 0.3);
            background-color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <label for="voiceSelect">Choose Voice:</label>
    <select id="voiceSelect"></select>

    <h2>Upload an image</h2>
    <form method="post" enctype="multipart/form-data">
        <!-- Upload from local -->
        <label>Choose from device:</label><br>
        <input type="file" name="image" accept="image/*"><br><br>

        <!-- Upload from camera -->
        <label>Take a photo:</label><br>
        <input type="file" name="image" accept="image/*" capture="environment"><br><br>

        <input type="submit" value="Upload">
    </form>

    {% if filename %}
    <h3>Click on a word to hear it:</h3>
    <div class="image-container" id="imageContainer">
        <img src="{{ url_for('static', filename='uploads/' + filename) }}" id="uploadedImage">

        <script>
            const boxes = JSON.parse(`{{ boxes | safe }}`);
            const container = document.getElementById('imageContainer');
            const img = document.getElementById('uploadedImage');

            img.onload = () => {
                const scaleX = img.width / img.naturalWidth;
                const scaleY = img.height / img.naturalHeight;

                boxes.forEach(box => {
                    const div = document.createElement('div');
                    div.className = 'word-box';
                    div.style.left = (box.left * scaleX) + 'px';
                    div.style.top = (box.top * scaleY) + 'px';
                    div.style.width = (box.width * scaleX) + 'px';
                    div.style.height = (box.height * scaleY) + 'px';
                    div.title = box.text;

                    div.onclick = () => {
                        speakText(box.text);  // Use selected voice
                    };

                    container.appendChild(div);
                });
            };
        </script>
    </div>

    <script>
        const voiceSelect = document.getElementById('voiceSelect');
        let voices = [];

        function populateVoices() {
            voices = speechSynthesis.getVoices();

            if (voices.length === 0) {
                setTimeout(populateVoices, 100);
                return;
            }

            voiceSelect.innerHTML = '';
            voices.forEach((voice, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${voice.name} (${voice.lang})${voice.default ? ' [default]' : ''}`;
                voiceSelect.appendChild(option);
            });
        }

        function speakText(text) {
            const utter = new SpeechSynthesisUtterance(text);
            const selectedVoiceIndex = voiceSelect.value;
            if (voices[selectedVoiceIndex]) {
                utter.voice = voices[selectedVoiceIndex];
            }
            speechSynthesis.speak(utter);
        }

        if (typeof speechSynthesis !== 'undefined') {
            speechSynthesis.onvoiceschanged = populateVoices;
            populateVoices();
        }
    </script>
    {% endif %}
</body>
</html>
