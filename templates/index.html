<!DOCTYPE html>
<html>
<head>
    <title>Clickable Image Text</title>
    <style>
        .image-container {
            position: relative;
            display: inline-block;
        }

        .word-box {
            position: absolute;
            border: 1px solid rgba(0, 0, 255, 0.3);
            background-color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>Upload an image</h2>
    <form method="post" enctype="multipart/form-data">
        <input type="file" name="image" required>
        <input type="submit" value="Upload">
    </form>

    {% if filename %}
    <h3>Click on a word to hear it:</h3>
    <div class="image-container">
        <img src="{{ url_for('static', filename='uploads/' + filename) }}" id="uploadedImage">
        <!-- Word Overlays -->
        <script>
            const boxes = JSON.parse(`{{ boxes | safe }}`);
            const container = document.querySelector('.image-container');
            const img = document.getElementById('uploadedImage');

            img.onload = () => {
                const scaleX = img.width / img.naturalWidth;
                const scaleY = img.height / img.naturalHeight;

                boxes.forEach(box => {
                    const div = document.createElement('div');
                    div.className = 'word-box';
                    div.style.left = (box.left * scaleX) + 'px';
                    div.style.top = (box.top * scaleY) + 'px';
                    div.style.width = (box.width * scaleX) + 'px';
                    div.style.height = (box.height * scaleY) + 'px';
                    div.title = box.text;

                    div.onclick = () => {
                        const utter = new SpeechSynthesisUtterance(box.text);
                        speechSynthesis.speak(utter);
                    };

                    container.appendChild(div);
                });
            };
        </script>
    </div>
    {% endif %}
</body>
</html>
